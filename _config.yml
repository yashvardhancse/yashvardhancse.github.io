title: YashVardhan Gupta
description: Personal portfolio and blog of YashVardhan Gupta - computer science student focused on AI systems, machine learning, distributed systems, CUDA programming, and physics. Explore projects, learning logs, and open source contributions.
email: yashvardhancse@gmail.com
url: "https://yashvardhancse.github.io"
baseurl: ""
timezone: Asia/Kolkata
lang: en

#google analytics
google_analytics: G-EZNSFMP4V2

# SEO
google_site_verification: ""
social:
  name: YashVardhan Gupta
  links:
    - https://github.com/yashvardhancse
    - https://www.linkedin.com/in/yashvardhancse/
    - https://instagram.com/camera.yash

author:
  name: YashVardhan Gupta
  email: yashvardhancse@gmail.com

github_username: yashvardhancse
linkedin_username: yashvardhancse
instagram_username: camera.yash

markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

collections:
  explorations:
    output: true
    permalink: /explorations/:name/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      author: YashVardhan Gupta
  - scope:
      path: ""
      type: "explorations"
    values:
      layout: post
      author: YashVardhan Gupta
  - scope:
      path: ""
    values:
      layout: page

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
